general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/dotfiles/wallpapers/2.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
