# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(255, 255, 255, 0.15)
    inner_color = rgba(0, 0, 0, 0.3)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    placeholder_text = <i>password...</i>
    check_color = rgb(255, 150, 50)
    fail_color = rgb(220, 60, 60)
    fail_text = <i>incorrect</i>
    capslock_color = rgb(255, 150, 50)
    position = 0, -60
    halign = center
    valign = center
    rounding = 12
}