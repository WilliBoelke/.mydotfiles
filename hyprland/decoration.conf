# -----------------------------------------------------
# General window decoration
# name: "Rounding All Blur"
# -----------------------------------------------------

decoration {
    rounding = 10
    active_opacity = 1
    inactive_opacity = 0.6
    fullscreen_opacity = 1

    blur {
        enabled = true
        size = 10
        passes = 7
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = 0x66000000
    }
}


layerrule {
    name = blur_quickshell
    match:namespace = quickshell
    blur = on
    ignore_alpha = 0
}

