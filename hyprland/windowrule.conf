# -----------------------------------------------------
# Window rules
# -----------------------------------------------------

# idleinhibit
# windowrule = match:class = ([window]), idleinhibit = fullscreen # Available modes: none, always, focus, fullscreen

#xwayland related rules
# when moving objects in resolve a large border is produced 
# This rule prevents that and serves as a template for any problematic xwayland apps
# windowrule = noblur, class:^(\bresolve\b)$, xwayland:1
# This is a general rule for xwayland apps but can have other consequences 
# for one user it impacted EMACs so it's disabled by default 
# It's here as a reference or for quick triage of xwayland ap
#windowrule = noblur, xwayland:1


# =============================================================================
# Floating Window Rules
# =============================================================================

# Pavucontrol (audio mixer)
windowrule {
    name = pavucontrol
    match:class = (.*org.pulseaudio.pavucontrol.*)
    float = true
}

# Blueman Manager (bluetooth)
windowrule {
    name = blueman-manager
    match:class = (blueman-manager)
    float = true
    center = true
    size = 800 600
}

# Network Manager connection editor
windowrule {
    name = nm-connection-editor
    match:class = (nm-connection-editor)
    float = true
    center = true
    size = 800 700
}

# nwg-look (GTK theme manager)
windowrule {
    name = nwg-look
    match:class = (nwg-look)
    float = true
    center = true
    size = 700 600
}


# nwg-displays (monitor configuration)
windowrule {
    name = nwg-displays
    match:class = (nwg-displays)
    float = true
    center = true
    size = 900 600
}


# Picture-in-Picture (browser feature)
windowrule {
    name = Picture-in-Picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    pin = true
    center = true
}

# Hyprland share picker (screen sharing)
windowrule {
    name = hyprland-share-picker
    match:class = (hyprland-share-picker)
    float = true
    pin = true
    center = true
    size = 600 400
}

# JetBrains IDE floating popup focus fix
windowrule {
    name = jetbrains-popup-fix
    match:class = ^(jetbrains-.*)$
    match:float = true
    focus_on_activate = on
}


# JetBrains IDE tooltip/menu nofocus fix
windowrule {
    name = jetbrains-tooltip-nofocus
    match:class = ^(jetbrains-.*)$
    match:title = ^win\d+$
    no_focus = true
    opaque = true
}

# Steam games
windowrule {
    name = steam-games
    match:class = ^steam_app\d+$
    fullscreen = true
    monitor = 0
    workspace = 3 silent
}
